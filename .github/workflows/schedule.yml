name: Generate Sports Feeds

on:
  schedule:
    # Once per day at 7am UTC (adjust as you like)
    - cron: '0 7 * * *'
  # Optional: allow manual runs from the Actions tab
  workflow_dispatch: {}

permissions:
  contents: write   # allow this workflow to push to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run feeds action
        uses: llun/feeds@3.0.0
        with:
          storageType: files
          opmlFile: feeds.opml     # our OPML file
          branch: contents         # output branch for the static site
          token: ${{ secrets.GITHUB_TOKEN }}
